version: "3.9"

services:

  # ── API Python con FastAPI ──────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartmail_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://smartmail_user:smartmail_pass@postgres:5432/smartmail
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend React ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartmail_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # ── n8n (automatización) ─────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: smartmail_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=smartmail123
      - N8N_HOST=traction-pregnant-province.ngrok-free.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://traction-pregnant-province.ngrok-free.dev
      - API_URL=http://api:8000
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - api
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartmail_db
    environment:
      - POSTGRES_DB=smartmail
      - POSTGRES_USER=smartmail_user
      - POSTGRES_PASSWORD=smartmail_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  n8n_data:
  postgres_data: